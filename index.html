<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Aplikasi Peminjaman Buku</title>
  <style>
    body {
      font-family: Arial;
      background: #ffe4ec;
      text-align: center;
    }
    h1 {
      color: #ff4d88;
    }
    .container {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 8px;
      margin: 5px;
    }
    button {
      background: #ff4d88;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ff4d88;
      padding: 8px;
    }
  </style>
</head>
<body>

<h1>📚 Peminjaman Buku</h1>

<div class="container">
  <input type="text" id="nama" placeholder="Nama Siswa">
  <input type="text" id="kelas" placeholder="Kelas">
  <input type="text" id="buku" placeholder="Judul Buku">
  <br>
  <button onclick="pinjam()">Pinjam Buku</button>
</div>

<table>
  <thead>
    <tr>
      <th>Nama</th>
      <th>Kelas</th>
      <th>Buku</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
function pinjam() {
  let nama = document.getElementById("nama").value;
  let kelas = document.getElementById("kelas").value;
  let buku = document.getElementById("buku").value;

  if(nama === "" || kelas === "" || buku === "") {
    alert("Isi semua data!");
    return;
  }

  let tabel = document.getElementById("data");
  let row = tabel.insertRow();

  row.insertCell(0).innerHTML = nama;
  row.insertCell(1).innerHTML = kelas;
  row.insertCell(2).innerHTML = buku;

  document.getElementById("nama").value = "";
  document.getElementById("kelas").value = "";
  document.getElementById("buku").value = "";
}
</script>

</body>
</html>
