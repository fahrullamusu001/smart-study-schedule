<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Perpus Pinky - Tugas Informatika</title>
    <style>
        /* CSS UNTUK TAMPILAN MOBILE & WARNA PINK */
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fbb1bd;
            --bg-pink: #f9f0f2;
            --dark-pink: #d03d5a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-pink);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .mobile-container {
            width: 100%;
            max-width: 450px; /* Ukuran maksimal HP */
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--primary-pink);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .content {
            padding: 20px;
        }

        .card {
            background: #fff;
            border: 2px solid var(--soft-pink);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        h3 { color: var(--dark-pink); margin-top: 0; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--soft-pink);
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: var(--dark-pink); }

        .status-box {
            background: #fdf2f4;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #555;
            margin-top: 10px;
        }

        .hidden { display: none; }

        footer {
            text-align: center;
            font-size: 0.8em;
            color: var(--soft-pink);
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <header>
        <h1>E-Perpus School</h1>
        <p>Informatika Kelas 11</p>
    </header>

    <div class="content">
        <!-- TAHAP 1: CEK KARTU & CARI BUKU -->
        <div id="step1" class="card">
            <h3>1. Cari Buku</h3>
            <p>Pastikan membawa kartu pelajar!</p>
            <input type="text" id="cariBuku" placeholder="Ketik judul buku (contoh: Biologi)...">
            <button onclick="nextStep(2)">Cari & Ambil Buku</button>
        </div>

        <!-- TAHAP 2: CEK KONDISI -->
        <div id="step2" class="card hidden">
            <h3>2. Cek Kondisi Buku</h3>
            <p>Periksa apakah ada kerusakan pada buku.</p>
            <label>
                <input type="checkbox" id="kondisiBuku" style="width: auto;"> Buku dalam kondisi baik
            </label>
            <button style="margin-top:15px;" onclick="checkKondisi()">Lanjut ke Petugas</button>
            <button style="background: #ccc; margin-top:5px;" onclick="backTo(1)">Batal</button>
        </div>

        <!-- TAHAP 3: PROSES PINJAM (PETUGAS) -->
        <div id="step3" class="card hidden">
            <h3>3. Meja Petugas</h3>
            <input type="text" id="namaSiswa" placeholder="Nama Lengkap Siswa">
            <input type="text" id="kelasSiswa" placeholder="Kelas (Contoh: 11 MIPA 1)">
            <p style="font-size: 0.8em;">*Data akan diinput ke sistem</p>
            <button onclick="prosesPinjam()">Konfirmasi Peminjaman</button>
        </div>

        <!-- TAHAP 4: STATUS PINJAM & PENGEMBALIAN -->
        <div id="step4" class="card hidden">
            <h3>4. Status Peminjaman</h3>
            <div id="detailPinjam" class="status-box"></div>
            <hr border="1" color="#fbb1bd">
            <p>Kembalikan buku sebelum batas waktu!</p>
            <button onclick="prosesKembali()">Kembalikan Buku Sekarang</button>
        </div>
    </div>

    <footer>Tugas Informatika Semester 2</footer>
</div>

<script>
    // LOGIKA APLIKASI BERDASARKAN ALGORITMA
    let db = {}; 

    function nextStep(step) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
    }

    function backTo(step) {
        nextStep(step);
    }

    function checkKondisi() {
        const ok = document.getElementById('kondisiBuku').checked;
        if(ok) {
            nextStep(3);
        } else {
            alert("Siswa melaporkan kerusakan. Buku harus diperbaiki petugas dulu!");
        }
    }

    function prosesPinjam() {
        const nama = document.getElementById('namaSiswa').value;
        const kelas = document.getElementById('kelasSiswa').value;
        const buku = document.getElementById('cariBuku').value;

        if(!nama || !kelas) return alert("Lengkapi data siswa!");

        // Set Tanggal (Simulasi sistem komputer)
        let tglPinjam = new Date();
        let tglKembali = new Date();
        tglKembali.setDate(tglPinjam.getDate() + 7); // Batas waktu 7 hari

        db = {
            nama: nama,
            buku: buku,
            tgl: tglPinjam.toLocaleDateString(),
            deadline: tglKembali.toLocaleDateString(),
            rawDeadline: tglKembali
        };

        document.getElementById('detailPinjam').innerHTML = `
            <b>Peminjam:</b> ${db.nama} (${db.kelasSiswa}) <br>
            <b>Buku:</b> ${db.buku} <br>
            <b>Tgl Pinjam:</b> ${db.tgl} <br>
            <b>Batas Kembali:</b> <span style="color:red">${db.deadline}</span>
        `;
        
        alert("Pencatatan Berhasil! Terima kasih.");
        nextStep(4);
    }

    function prosesKembali() {
        // Simulasi pengecekan denda
        let hariIni = new Date();
        let pesan = "Petugas memeriksa kondisi buku...\n";
        
        if(hariIni > db.rawDeadline) {
            pesan += "Siswa terlambat! Sanksi: Denda Rp 5.000";
        } else {
            pesan += "Kondisi Baik & Tepat Waktu. Selesai!";
        }

        alert(pesan);
        alert("Buku dikembalikan ke rak. Proses Selesai.");
        location.reload(); // Reset aplikasi
    }
</script>

</body>
</html>
