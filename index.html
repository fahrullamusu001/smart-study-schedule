<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Perpus Pinky</title>

<style>

:root{
    --pink1:#ff85a2;
    --pink2:#fbb1bd;
    --pink3:#fff0f5;
    --pink4:#d63384;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:var(--pink3);
    display:flex;
    justify-content:center;
    min-height:100vh;
    transition:0.3s;
}

.mobile-container{
    width:100%;
    max-width:450px;
    min-height:100vh;
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

header{
    background:linear-gradient(135deg,var(--pink1),var(--pink4));
    color:white;
    text-align:center;
    padding:25px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

header h1{
    margin-bottom:5px;
}

#jam{
    margin-top:10px;
    font-size:14px;
}

.dark-btn{
    margin-top:15px;
    background:white;
    color:var(--pink4);
    border:none;
    padding:10px 15px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.content{
    padding:20px;
}

.card{
    background:white;
    border:2px solid var(--pink2);
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
    animation:muncul 0.5s;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h3{
    color:var(--pink4);
    margin-bottom:10px;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:2px solid var(--pink2);
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--pink1);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:var(--pink4);
}

.hidden{
    display:none;
}

.status-box{
    background:#fff5f8;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    line-height:1.8;
}

#coverBuku{
    display:block;
    margin:15px auto;
    border-radius:10px;
    width:120px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

table th{
    background:var(--pink1);
    color:white;
    padding:10px;
    font-size:14px;
}

table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
    font-size:13px;
}

footer{
    text-align:center;
    padding:20px;
    color:#999;
    font-size:13px;
}

.selesai{
    text-decoration:line-through;
    opacity:0.6;
}

.action-btn{
    padding:7px 10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin:2px;
    font-size:12px;
}

.hijau{
    background:#28a745;
}

.merah{
    background:#dc3545;
}

/* DARK MODE */

.dark{
    background:#1e1e1e;
}

.dark .mobile-container{
    background:#2b2b2b;
    color:white;
}

.dark .card{
    background:#333;
    color:white;
}

.dark input,
.dark select{
    background:#444;
    color:white;
}

.dark .status-box{
    background:#444;
}

</style>
</head>

<body>

<div class="mobile-container">

<header>

    <h1>📚 E-Perpus Pinky</h1>
    <p>Tugas Informatika Kelas 11</p>

    <p id="jam"></p>

    <button class="dark-btn" onclick="darkMode()">
        🌙 Dark Mode
    </button>

</header>

<div class="content">

    <!-- STEP 1 -->

    <div id="step1" class="card">

        <h3>1. Cari Buku</h3>

        <p>Pastikan membawa kartu pelajar.</p>

        <select id="cariBuku" onchange="tampilCover()">

            <option value="">-- Pilih Buku --</option>

            <option>Pen. Agama Islam</option>
            <option>PKN</option>
            <option>Bahasa Indonesia</option>
            <option>Bahasa Inggris</option>
            <option>Seni Budaya</option>
            <option>PJOK</option>
            <option>Matematika</option>
            <option>Fisika</option>
            <option>Sejarah Indonesia</option>
            <option>Biologi</option>
            <option>Kimia</option>
            <option>Informatika</option>

        </select>

        <img
        id="coverBuku"
        src="https://via.placeholder.com/120x170/ff85a2/ffffff?text=Buku"
        >

        <button onclick="nextStep(2)">
            Cari & Ambil Buku
        </button>

    </div>

    <!-- STEP 2 -->

    <div id="step2" class="card hidden">

        <h3>2. Cek Kondisi Buku</h3>

        <p>Periksa kondisi buku sebelum dipinjam.</p>

        <label>

            <input
            type="checkbox"
            id="kondisiBuku"
            style="width:auto;"
            >

            Buku dalam kondisi baik

        </label>

        <button onclick="checkKondisi()">
            Lanjut ke Petugas
        </button>

        <button
        onclick="backTo(1)"
        style="background:#ccc;color:black;"
        >
            Batal
        </button>

    </div>

    <!-- STEP 3 -->

    <div id="step3" class="card hidden">

        <h3>3. Data Peminjaman</h3>

        <input
        type="text"
        id="namaSiswa"
        placeholder="Nama Lengkap"
        >

        <input
        type="text"
        id="kelasSiswa"
        placeholder="Kelas"
        >

        <button onclick="prosesPinjam()">
            Konfirmasi Peminjaman
        </button>

    </div>

    <!-- STEP 4 -->

    <div id="step4" class="card hidden">

        <h3>4. Status Peminjaman</h3>

        <div id="detailPinjam" class="status-box"></div>

        <button onclick="prosesKembali()">
            Kembalikan Buku
        </button>

        <button onclick="peminjamanBaru()">
            ➕ Buat Peminjaman Baru
        </button>

    </div>

    <!-- RIWAYAT -->

    <div class="card">

        <h3>📋 Riwayat Peminjaman</h3>

        <table>

            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Buku</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="riwayatTable">

            </tbody>

        </table>

    </div>

</div>

<footer>
    Dibuat Untuk Tugas Informatika Semester 2
</footer>

</div>

<script>

let db = {};

/* JAM REALTIME */

setInterval(() => {

    let now = new Date();

    document.getElementById("jam").innerHTML =
    now.toLocaleTimeString('id-ID');

},1000);

/* DARK MODE */

function darkMode(){

    document.body.classList.toggle("dark");

}

/* PINDAH STEP */

function nextStep(step){

    document
    .querySelectorAll("#step1,#step2,#step3,#step4")
    .forEach(card => {

        card.classList.add("hidden");

    });

    document
    .getElementById("step"+step)
    .classList.remove("hidden");

}

function backTo(step){

    nextStep(step);

}

/* CEK KONDISI */

function checkKondisi(){

    let ok =
    document.getElementById("kondisiBuku").checked;

    if(ok){

        nextStep(3);

    }

    else{

        alert(
        "Buku rusak. Laporkan ke petugas!"
        );

    }

}

/* COVER BUKU */

function tampilCover(){

    let buku =
    document.getElementById("cariBuku").value;

    let gambar =
    document.getElementById("coverBuku");

    gambar.src =
    "https://via.placeholder.com/120x170/ff85a2/ffffff?text="
    + encodeURIComponent(buku);

}

/* PROSES PINJAM */

function prosesPinjam(){

    let nama =
    document.getElementById("namaSiswa").value;

    let kelas =
    document.getElementById("kelasSiswa").value;

    let buku =
    document.getElementById("cariBuku").value;

    if(!nama || !kelas || !buku){

        alert("Lengkapi data!");

        return;

    }

    let tglPinjam = new Date();

    let tglKembali = new Date();

    tglKembali.setDate(
    tglPinjam.getDate() + 7
    );

    db = {

        nama:nama,
        kelas:kelas,
        buku:buku,
        tgl:tglPinjam.toLocaleDateString(),
        deadline:tglKembali.toLocaleDateString(),
        rawDeadline:tglKembali

    };

    document.getElementById(
    "detailPinjam"
    ).innerHTML =

    `
    <b>Nama:</b> ${db.nama}<br>
    <b>Kelas:</b> ${db.kelas}<br>
    <b>Buku:</b> ${db.buku}<br>
    <b>Tanggal Pinjam:</b> ${db.tgl}<br>
    <b>Batas Pengembalian:</b>
    <span style="color:red;">
    ${db.deadline}
    </span>
    `;

    /* SUARA */

    let suara = new Audio(
    "https://www.soundjay.com/buttons/sounds/button-3.mp3"
    );

    suara.play();

    /* TAMBAH RIWAYAT */

    tambahRiwayat(nama,buku);

    alert("Peminjaman berhasil!");

    nextStep(4);

}

/* TAMBAH RIWAYAT */

function tambahRiwayat(nama,buku){

    let table =
    document.getElementById("riwayatTable");

    let row = table.insertRow();

    row.innerHTML = `

        <td>${nama}</td>

        <td>${buku}</td>

        <td class="status">
            Dipinjam
        </td>

        <td>

            <button
            class="action-btn hijau"
            onclick="selesai(this)">
            Selesai
            </button>

            <button
            class="action-btn merah"
            onclick="hapus(this)">
            Hapus
            </button>

        </td>

    `;

}

/* TANDAI SELESAI */

function selesai(btn){

    let row = btn.parentElement.parentElement;

    row.classList.toggle("selesai");

    row.querySelector(".status").innerHTML =
    "Selesai";

}

/* HAPUS RIWAYAT */

function hapus(btn){

    let row = btn.parentElement.parentElement;

    row.remove();

}

/* PENGEMBALIAN */

function prosesKembali(){

    let hariIni = new Date();

    let pesan =
    "Petugas memeriksa kondisi buku...\n";

    if(hariIni > db.rawDeadline){

        pesan +=
        "Terlambat! Denda Rp5.000";

    }

    else{

        pesan +=
        "Buku dikembalikan tepat waktu.";

    }

    alert(pesan);

    alert(
    "Buku dikembalikan ke rak."
    );

}

/* PEMINJAMAN BARU */

function peminjamanBaru(){

    document.getElementById("namaSiswa").value = "";
    document.getElementById("kelasSiswa").value = "";
    document.getElementById("cariBuku").value = "";
    document.getElementById("kondisiBuku").checked = false;

    document.getElementById("coverBuku").src =
    "https://via.placeholder.com/120x170/ff85a2/ffffff?text=Buku";

    nextStep(1);

}

</script>

</body>
</html>
