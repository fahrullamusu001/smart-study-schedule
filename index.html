<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Perpus Pinky</title>

<style>

:root{
    --pink1:#ff85a2;
    --pink2:#fbb1bd;
    --pink3:#fff0f5;
    --pink4:#d63384;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--pink3);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.mobile-container{
    width:100%;
    max-width:450px;
    min-height:100vh;
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

header{
    background:linear-gradient(135deg,var(--pink1),var(--pink4));
    color:white;
    text-align:center;
    padding:25px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

header h1{
    font-size:28px;
}

#jam{
    margin-top:10px;
    font-size:20px;
}

.dark-btn{
    margin-top:10px;
    background:white;
    color:var(--pink4);
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.login-btn{
    margin-top:10px;
    background:#6f42c1;
    color:white;
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.logout-btn{
    margin-top:10px;
    background:#dc3545;
    color:white;
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.content{
    padding:18px;
}

.card{
    background:white;
    border:2px solid var(--pink2);
    border-radius:22px;
    padding:18px;
    margin-bottom:20px;
}

h3{
    color:var(--pink4);
    margin-bottom:15px;
    font-size:22px;
}

input,
select{
    width:100%;
    padding:14px;
    border:2px solid var(--pink2);
    border-radius:16px;
    margin-top:12px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:var(--pink1);
    color:white;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
    font-size:16px;
}

.hidden{
    display:none;
}

.status-box{
    background:#fff5f8;
    padding:15px;
    border-radius:18px;
    line-height:2;
}

#coverBuku{
    width:120px;
    display:block;
    margin:15px auto;
    border-radius:12px;
}

.table-container{
    overflow-x:auto;
    width:100%;
}

table{
    border-collapse:collapse;
    min-width:1100px;
    width:max-content;
}

th{
    background:var(--pink1);
    color:white;
    padding:12px;
    font-size:15px;
    white-space:nowrap;
}

td{
    border:1px solid #ddd;
    padding:8px 12px;
    font-size:14px;
    text-align:center;
    white-space:nowrap;
}

.nomor{
    color:var(--pink4);
    font-weight:bold;
}

.kosong{
    color:#999;
}

.selesai{
    text-decoration:line-through;
    opacity:0.6;
}

.btn-selesai{
    background:#28a745;
    border:none;
    color:white;
    padding:5px 8px;
    border-radius:7px;
    cursor:pointer;
    font-size:12px;
    margin:0;
    width:auto;
}

.action-buttons{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:15px;
    flex-wrap:wrap;
}

.btn-filter{
    width:auto;
    padding:8px 14px;
    border-radius:10px;
    font-size:12px;
    margin:0;
}

.btn-hapus-semua{
    width:auto;
    background:#dc3545;
    padding:8px 14px;
    border-radius:10px;
    font-size:12px;
    margin:0;
}

.btn-download{
    width:auto;
    background:#6f42c1;
    padding:8px 14px;
    border-radius:10px;
    font-size:12px;
    margin:0;
}

footer{
    text-align:center;
    padding:30px;
    color:#999;
    font-size:15px;
}

.dropdown-container{
    position:relative;
}

.dropdown-list{
    position:absolute;
    width:100%;
    background:white;
    border:2px solid var(--pink2);
    border-radius:16px;
    max-height:220px;
    overflow-y:auto;
    z-index:10;
}

.dropdown-item{
    padding:14px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.dropdown-item:hover{
    background:#fff0f5;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.dashboard-box{
    background:#fff0f5;
    padding:10px;
    border-radius:15px;
    border:2px solid #fbb1bd;
    text-align:center;
}

.dashboard-icon{
    font-size:20px;
}

.dashboard-number{
    font-size:18px;
    font-weight:bold;
    color:#d63384;
    margin-top:5px;
}

.dashboard-label{
    font-size:11px;
    margin-top:3px;
}

.dark{
    background:#1e1e1e;
}

.dark .mobile-container{
    background:#2b2b2b;
    color:white;
}

.dark .card{
    background:#333;
}

.dark input,
.dark select{
    background:#444;
    color:white;
}

.dark .dropdown-list{
    background:#444;
}

.dark .status-box{
    background:#444;
}

</style>

</head>

<body>

<div class="mobile-container">

<header>

<h1>📚 E-Perpus Pinky</h1>

<p>Tugas Informatika Kelas 11</p>

<p id="jam"></p>

<button class="dark-btn" onclick="darkMode()">
🌙 Dark Mode
</button>

<button
id="loginBtn"
class="login-btn"
onclick="loginAdmin()"
>
🔐 Login Admin
</button>

<button
id="logoutBtn"
class="logout-btn hidden"
onclick="logoutAdmin()"
>
🚪 Logout Admin
</button>

</header>

<div class="content">

<div class="card">

<h3>📊 Dashboard Ringkasan</h3>

<div class="dashboard-grid">

<div class="dashboard-box">
<div class="dashboard-icon">📚</div>
<div id="totalBuku" class="dashboard-number">0</div>
<div class="dashboard-label">Total Buku</div>
</div>

<div class="dashboard-box">
<div class="dashboard-icon">👨‍🎓</div>
<div id="totalSiswa" class="dashboard-number">0</div>
<div class="dashboard-label">Total Siswa</div>
</div>

<div class="dashboard-box">
<div class="dashboard-icon">📝</div>
<div id="totalTransaksi" class="dashboard-number">0</div>
<div class="dashboard-label">Transaksi</div>
</div>

</div>

</div>

<div id="adminArea" class="hidden">

<div id="step1" class="card">

<h3>1. Cari Buku</h3>

<select id="cariBuku" onchange="tampilCover()">

<option value="">-- Pilih Buku --</option>

<option>Pen. Agama Islam</option>
<option>PKN</option>
<option>Bahasa Indonesia</option>
<option>Bahasa Inggris</option>
<option>Seni Budaya</option>
<option>PJOK</option>
<option>Matematika</option>
<option>Fisika</option>
<option>Sejarah Indonesia</option>
<option>Biologi</option>
<option>Kimia</option>
<option>Informatika</option>

</select>

<input
type="number"
id="jumlahBuku"
placeholder="Jumlah Buku Dipinjam"
min="1"
max="10"
>

<img
id="coverBuku"
src="https://via.placeholder.com/120x170/ff85a2/ffffff?text=Buku"
>

<button onclick="nextStep(2)">
Cari & Ambil Buku
</button>

</div>

</div>

<div class="card">

<h3>📋 Riwayat Peminjaman</h3>

<div class="table-container">

<table id="tabelRiwayat">

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>Kelas</th>
<th>Buku</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>

</tr>

</thead>

<tbody id="riwayatTable">

</tbody>

</table>

</div>

<div class="action-buttons">

<button
class="btn-filter"
onclick="filterRiwayat('Dipinjam')"
>
Dipinjam
</button>

<button
class="btn-filter"
onclick="filterRiwayat('Selesai')"
>
Selesai
</button>

<button
class="btn-filter"
onclick="filterRiwayat('Semua')"
>
Semua
</button>

<button
class="btn-hapus-semua"
onclick="hapusSemua()"
>
🗑 Hapus Semua
</button>

<button
class="btn-download"
onclick="downloadExcel()"
>
📥 Download Riwayat
</button>

</div>

</div>

</div>

<footer>
Dibuat Oleh Fahrul Lamusu
</footer>

</div>

<script>

setInterval(()=>{

let now = new Date();

document.getElementById("jam").innerHTML =
now.toLocaleTimeString('id-ID',{
hour:'2-digit',
minute:'2-digit'
});

},1000);

function darkMode(){
document.body.classList.toggle("dark");
}

function loginAdmin(){

let username = prompt("Masukkan Username Admin");
let password = prompt("Masukkan Password Admin");

if(
username === "admin" &&
password === "12345"
){

localStorage.setItem("adminLogin","true");

document.getElementById("adminArea")
.classList.remove("hidden");

document.getElementById("loginBtn")
.classList.add("hidden");

document.getElementById("logoutBtn")
.classList.remove("hidden");

alert("Login Admin Berhasil");

}else{

alert("Username atau Password salah");

}

}

function logoutAdmin(){

localStorage.removeItem("adminLogin");

document.getElementById("adminArea")
.classList.add("hidden");

document.getElementById("loginBtn")
.classList.remove("hidden");

document.getElementById("logoutBtn")
.classList.add("hidden");

alert("Logout berhasil");

}

if(localStorage.getItem("adminLogin") === "true"){

document.getElementById("adminArea")
.classList.remove("hidden");

document.getElementById("loginBtn")
.classList.add("hidden");

document.getElementById("logoutBtn")
.classList.remove("hidden");

}

let dataRiwayat =
JSON.parse(localStorage.getItem("riwayatPerpus")) || [];

function updateDashboard(){

let totalBuku = 0;

let siswaUnik = [];

dataRiwayat.forEach(item=>{

totalBuku += Number(item.jumlah);

if(!siswaUnik.includes(item.nama)){
siswaUnik.push(item.nama);
}

});

document.getElementById("totalBuku").innerHTML =
totalBuku;

document.getElementById("totalSiswa").innerHTML =
siswaUnik.length;

document.getElementById("totalTransaksi").innerHTML =
dataRiwayat.length;

}

function tampilkanRiwayat(filter = "Semua"){

let table =
document.getElementById("riwayatTable");

table.innerHTML = "";

let filteredData = dataRiwayat;

if(filter !== "Semua"){
filteredData = dataRiwayat.filter(item => item.status === filter);
}

if(filteredData.length === 0){

table.innerHTML = `
<tr>
<td class="nomor">1</td>
<td colspan="7" class="kosong">
Belum ada riwayat peminjaman
</td>
</tr>
`;

return;

}

filteredData.forEach((item,index)=>{

let row = table.insertRow();

row.innerHTML = `

<td class="nomor">${index+1}</td>
<td>${item.nama}</td>
<td>${item.kelas}</td>
<td>${item.buku}</td>
<td>${item.jumlah}</td>
<td>${item.tanggal}</td>
<td>${item.jam}</td>
<td>${item.status}</td>

`;

});

}

function filterRiwayat(status){
tampilkanRiwayat(status);
}

function hapusSemua(){

let konfirmasi =
confirm("Hapus semua riwayat?");

if(konfirmasi){

dataRiwayat = [];

localStorage.removeItem("riwayatPerpus");

tampilkanRiwayat();

updateDashboard();

}

}

function downloadExcel(){

let isiTabel = "";

dataRiwayat.forEach((item,index)=>{

isiTabel += `

<tr>

<td>${index+1}</td>
<td>${item.nama}</td>
<td>${item.kelas}</td>
<td>${item.buku}</td>
<td>${item.jumlah}</td>
<td>${item.tanggal}</td>
<td>${item.jam}</td>
<td>${item.status}</td>

</tr>

`;

});

let html = `

<html>

<head>

<meta charset="UTF-8">

<style>

body{
font-family:Arial;
padding:30px;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:30px;
}

table{
border-collapse:collapse;
width:100%;
min-width:2400px;
}

th{
background:black;
color:white;
border:4px solid black;
padding:35px;
text-align:center;
font-size:26px;
font-weight:bold;
}

td{
border:4px solid black;
padding:35px;
text-align:center;
font-size:24px;
white-space:nowrap;
}

</style>

</head>

<body>

<h1>
Laporan Riwayat Peminjaman Buku Perpustakaan
</h1>

<table>

<tr>

<th>No</th>
<th>Nama</th>
<th>Kelas</th>
<th>Buku</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>

</tr>

${isiTabel}

</table>

</body>

</html>

`;

let blob = new Blob(
['\ufeff', html],
{
type:'application/vnd.ms-excel'
}
);

let url =
URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"Laporan_Riwayat_Peminjaman.xls";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

}

updateDashboard();
tampilkanRiwayat();

</script>

</body>
</html>
