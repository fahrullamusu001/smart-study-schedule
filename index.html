<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Perpus Pinky</title>

<style>

:root{
    --pink1:#ff85a2;
    --pink2:#fbb1bd;
    --pink3:#fff0f5;
    --pink4:#d63384;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--pink3);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.mobile-container{
    width:100%;
    max-width:450px;
    min-height:100vh;
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

header{
    background:linear-gradient(135deg,var(--pink1),var(--pink4));
    color:white;
    text-align:center;
    padding:25px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

header h1{
    font-size:28px;
}

#jam{
    margin-top:10px;
    font-size:20px;
}

.dark-btn{
    margin-top:15px;
    background:white;
    color:var(--pink4);
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.content{
    padding:18px;
}

.card{
    background:white;
    border:2px solid var(--pink2);
    border-radius:22px;
    padding:18px;
    margin-bottom:15px;
}

h3{
    color:var(--pink4);
    margin-bottom:15px;
    font-size:22px;
}

input,
select{
    width:100%;
    padding:14px;
    border:2px solid var(--pink2);
    border-radius:16px;
    margin-top:12px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:var(--pink1);
    color:white;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
    font-size:16px;
}

.hidden{
    display:none;
}

.status-box{
    background:#fff5f8;
    padding:15px;
    border-radius:18px;
    line-height:2;
}

#coverBuku{
    width:120px;
    display:block;
    margin:15px auto;
    border-radius:12px;
}

.table-container{
    overflow-x:auto;
    width:100%;
}

table{
    border-collapse:collapse;
    min-width:1100px;
    width:max-content;
}

th{
    background:var(--pink1);
    color:white;
    padding:10px;
    font-size:14px;
    white-space:nowrap;
}

td{
    border:1px solid #ddd;
    padding:8px 10px;
    font-size:13px;
    text-align:center;
    white-space:nowrap;
}

.nomor{
    color:var(--pink4);
    font-weight:bold;
}

.kosong{
    color:#999;
}

.selesai{
    text-decoration:line-through;
    opacity:0.6;
}

.btn-selesai{
    background:#28a745;
    border:none;
    color:white;
    padding:7px 10px;
    border-radius:8px;
    cursor:pointer;
}

.filter-btn{
    width:auto;
    padding:10px 16px;
    border-radius:12px;
    font-size:14px;
    background:#ff85a2;
    margin-top:0;
}

.btn-hapus-semua{
    width:auto;
    background:#dc3545;
    padding:10px 14px;
    font-size:14px;
    border-radius:12px;
    display:block;
    margin-left:auto;
    margin-top:15px;
}

.btn-download{
    width:auto;
    background:#6f42c1;
    padding:10px 14px;
    font-size:14px;
    border-radius:12px;
    display:block;
    margin-left:auto;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:30px;
    color:#999;
    font-size:15px;
}

.dropdown-container{
    position:relative;
}

.dropdown-list{
    position:absolute;
    width:100%;
    background:white;
    border:2px solid var(--pink2);
    border-radius:16px;
    max-height:220px;
    overflow-y:auto;
    z-index:10;
}

.dropdown-item{
    padding:14px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.dropdown-item:hover{
    background:#fff0f5;
}

.dark{
    background:#1e1e1e;
}

.dark .mobile-container{
    background:#2b2b2b;
    color:white;
}

.dark .card{
    background:#333;
}

.dark input,
.dark select{
    background:#444;
    color:white;
}

.dark .dropdown-list{
    background:#444;
}

.dark .status-box{
    background:#444;
}

.show-popup{
    opacity:1 !important;
    pointer-events:auto !important;
    transform:translate(-50%,-50%) scale(1) !important;
}

</style>

</head>

<body>

<div class="mobile-container">

<header>

<h1>📚 E-Perpus Pinky</h1>

<p>Tugas Informatika Kelas 11</p>

<p id="jam"></p>

<button class="dark-btn" onclick="darkMode()">
🌙 Dark Mode
</button>

</header>

<div class="content">

<!-- DASHBOARD PREMIUM -->

<div class="card">

<h3>📊 Dashboard Premium</h3>

<div style="
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
">

<div style="
background:linear-gradient(135deg,#ff85a2,#ffb6c1);
padding:18px;
border-radius:20px;
color:white;
text-align:center;
">

<div style="font-size:30px;">📚</div>

<div id="totalBuku" style="
font-size:26px;
font-weight:bold;
">
0
</div>

<div>Total Buku</div>

</div>

<div style="
background:linear-gradient(135deg,#d63384,#ff85a2);
padding:18px;
border-radius:20px;
color:white;
text-align:center;
">

<div style="font-size:30px;">👨‍🎓</div>

<div id="totalSiswa" style="
font-size:26px;
font-weight:bold;
">
0
</div>

<div>Total Siswa</div>

</div>

<div style="
background:linear-gradient(135deg,#ff9eb5,#ffc0cb);
padding:18px;
border-radius:20px;
color:white;
text-align:center;
">

<div style="font-size:30px;">📝</div>

<div id="totalTransaksi" style="
font-size:26px;
font-weight:bold;
">
0
</div>

<div>Total Transaksi</div>

</div>

<div style="
background:linear-gradient(135deg,#ff6f91,#ff85a2);
padding:18px;
border-radius:20px;
color:white;
text-align:center;
">

<div style="font-size:30px;">✅</div>

<div id="totalSelesai" style="
font-size:26px;
font-weight:bold;
">
0
</div>

<div>Buku Selesai</div>

</div>

</div>

</div>

<!-- STEP 1 -->

<div id="step1" class="card">

<h3>1. Cari Buku</h3>

<select id="cariBuku" onchange="tampilCover()">

<option value="">-- Pilih Buku --</option>

<option>Pen. Agama Islam</option>
<option>PKN</option>
<option>Bahasa Indonesia</option>
<option>Bahasa Inggris</option>
<option>Seni Budaya</option>
<option>PJOK</option>
<option>Matematika</option>
<option>Fisika</option>
<option>Sejarah Indonesia</option>
<option>Biologi</option>
<option>Kimia</option>
<option>Informatika</option>

</select>

<input
type="number"
id="jumlahBuku"
placeholder="Jumlah Buku Dipinjam"
min="1"
max="10"
>

<img
id="coverBuku"
src="https://via.placeholder.com/120x170/ff85a2/ffffff?text=Buku"
>

<button onclick="nextStep(2)">
Cari & Ambil Buku
</button>

</div>

<!-- RIWAYAT -->

<div class="card">

<h3>📋 Riwayat Peminjaman</h3>

<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
">

<button class="filter-btn" onclick="filterRiwayat('Semua')">
📋 Semua
</button>

<button class="filter-btn" onclick="filterRiwayat('Dipinjam')">
📚 Dipinjam
</button>

<button class="filter-btn" onclick="filterRiwayat('Selesai')">
✅ Selesai
</button>

</div>

<div class="table-container">

<table id="tabelRiwayat">

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>Kelas</th>
<th>Buku</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
<th>Selesai</th>

</tr>

</thead>

<tbody id="riwayatTable">

<tr>

<td class="nomor">1</td>

<td colspan="8" class="kosong">
Belum ada riwayat peminjaman
</td>

</tr>

</tbody>

</table>

</div>

<button
class="btn-hapus-semua"
onclick="hapusSemua()"
>
🗑 Hapus Semua Riwayat
</button>

<button
class="btn-download"
onclick="downloadExcel()"
>
📥 Download Riwayat
</button>

</div>

</div>

<footer>
Dibuat Oleh Fahrul Lamusu
</footer>

</div>

<script>

/* JAM */

setInterval(()=>{

let now = new Date();

document.getElementById("jam").innerHTML =
now.toLocaleTimeString('id-ID',{
hour:'2-digit',
minute:'2-digit'
});

},1000);

/* DARK MODE */

function darkMode(){
document.body.classList.toggle("dark");
}

/* STORAGE */

let dataRiwayat =
JSON.parse(localStorage.getItem("riwayatPerpus")) || [];

/* DASHBOARD */

function updateDashboard(){

let totalBuku = 0;
let siswaUnik = [];
let selesai = 0;

dataRiwayat.forEach(item=>{

totalBuku += Number(item.jumlah);

if(!siswaUnik.includes(item.nama)){
siswaUnik.push(item.nama);
}

if(item.status === "Selesai"){
selesai++;
}

});

document.getElementById("totalBuku").innerHTML =
totalBuku;

document.getElementById("totalSiswa").innerHTML =
siswaUnik.length;

document.getElementById("totalTransaksi").innerHTML =
dataRiwayat.length;

document.getElementById("totalSelesai").innerHTML =
selesai;

}

/* FILTER */

function filterRiwayat(status){

let rows =
document.querySelectorAll("#riwayatTable tr");

rows.forEach((row,index)=>{

if(index===0)return;

let statusCell =
row.querySelector(".status");

if(!statusCell)return;

if(status === "Semua"){
row.style.display = "";
}else{
row.style.display =
statusCell.innerHTML === status
? ""
: "none";
}

});

}

/* DOWNLOAD */

function downloadExcel(){

let html = `

<html>

<head>

<meta charset="UTF-8">

<style>

body{
font-family:Arial;
padding:30px;
}

h1{
text-align:center;
font-size:30px;
margin-bottom:30px;
color:#d63384;
}

table{
border-collapse:collapse;
width:100%;
font-size:22px;
}

th,td{
border:3px solid black;
padding:24px 40px;
text-align:center;
white-space:nowrap;
}

th{
background:#ffb6c1;
font-weight:bold;
}

</style>

</head>

<body>

<h1>
Laporan Riwayat Peminjaman Buku Perpustakaan
</h1>

${document.getElementById("tabelRiwayat").outerHTML}

</body>

</html>

`;

let blob = new Blob(
['\ufeff', html],
{
type:'application/vnd.ms-excel'
}
);

let url =
URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"Laporan_Riwayat_Perpustakaan.xls";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

}

updateDashboard();

</script>

</body>
    </html>
