<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Perpus Pinky</title>

<style>

:root{
    --pink1:#ff85a2;
    --pink2:#fbb1bd;
    --pink3:#fff0f5;
    --pink4:#d63384;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--pink3);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.mobile-container{
    width:100%;
    max-width:450px;
    min-height:100vh;
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

header{
    background:linear-gradient(135deg,var(--pink1),var(--pink4));
    color:white;
    text-align:center;
    padding:25px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

header h1{
    font-size:28px;
}

#jam{
    margin-top:10px;
    font-size:20px;
}

.dark-btn{
    margin-top:15px;
    background:white;
    color:var(--pink4);
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.content{
    padding:18px;
}

.card{
    background:white;
    border:2px solid var(--pink2);
    border-radius:22px;
    padding:18px;
    margin-bottom:20px;
    animation:muncul 0.4s ease;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h3{
    color:var(--pink4);
    margin-bottom:15px;
    font-size:22px;
}

input,
select{
    width:100%;
    padding:14px;
    border:2px solid var(--pink2);
    border-radius:16px;
    margin-top:12px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:var(--pink1);
    color:white;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.hidden{
    display:none;
}

.status-box{
    background:#fff5f8;
    padding:15px;
    border-radius:18px;
    line-height:2;
}

#coverBuku{
    width:120px;
    display:block;
    margin:15px auto;
    border-radius:12px;
}

.table-container{
    overflow-x:auto;
    width:100%;
}

table{
    border-collapse:collapse;
    min-width:1200px;
    width:max-content;
}

th{
    background:var(--pink1);
    color:white;
    padding:10px;
    font-size:14px;
    white-space:nowrap;
}

td{
    border:1px solid #ddd;
    padding:10px;
    font-size:13px;
    text-align:center;
    white-space:nowrap;
}

.nomor{
    color:var(--pink4);
    font-weight:bold;
}

.kosong{
    color:#999;
}

.selesai{
    text-decoration:line-through;
    opacity:0.6;
}

.btn-selesai{
    background:#28a745;
    border:none;
    color:white;
    padding:7px 10px;
    border-radius:8px;
    cursor:pointer;
}

.btn-edit{
    background:#ffc107;
    color:black;
    border:none;
    padding:7px 10px;
    border-radius:8px;
    cursor:pointer;
    margin-left:5px;
}

.btn-hapus-semua{
    width:auto;
    background:#dc3545;
    padding:12px 18px;
    border-radius:14px;
    display:block;
    margin-left:auto;
    margin-top:20px;
}

.btn-download{
    width:auto;
    background:#6f42c1;
    padding:12px 18px;
    border-radius:14px;
    display:block;
    margin-left:auto;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:30px;
    color:#999;
    font-size:15px;
}

.dropdown-container{
    position:relative;
}

.dropdown-list{
    position:absolute;
    width:100%;
    background:white;
    border:2px solid var(--pink2);
    border-radius:16px;
    max-height:220px;
    overflow-y:auto;
    z-index:10;
}

.dropdown-item{
    padding:14px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.dropdown-item:hover{
    background:#fff0f5;
}

.tab-btn{
    width:auto;
    padding:10px 16px;
    border-radius:12px;
    margin-right:10px;
    margin-bottom:10px;
}

.dark{
    background:#1e1e1e;
}

.dark .mobile-container{
    background:#2b2b2b;
    color:white;
}

.dark .card{
    background:#333;
}

.dark input,
.dark select{
    background:#444;
    color:white;
}

.dark .dropdown-list{
    background:#444;
}

.dark .status-box{
    background:#444;
}

</style>

</head>

<body>

<div class="mobile-container">

<header>

<h1>📚 E-Perpus Pinky</h1>

<p>Tugas Informatika Kelas 11</p>

<p id="jam"></p>

<button class="dark-btn" onclick="darkMode()">
🌙 Dark Mode
</button>

</header>

<div class="content">

<!-- STEP 1 -->

<div id="step1" class="card">

<h3>1. Cari Buku</h3>

<select id="cariBuku" onchange="tampilCover()">

<option value="">-- Pilih Buku --</option>

<option>Pen. Agama Islam</option>
<option>PKN</option>
<option>Bahasa Indonesia</option>
<option>Bahasa Inggris</option>
<option>Seni Budaya</option>
<option>PJOK</option>
<option>Matematika</option>
<option>Fisika</option>
<option>Sejarah Indonesia</option>
<option>Biologi</option>
<option>Kimia</option>
<option>Informatika</option>

</select>

<input
type="number"
id="jumlahBuku"
placeholder="Jumlah Buku Dipinjam"
min="1"
max="10"
>

<img
id="coverBuku"
src="https://via.placeholder.com/120x170/ff85a2/ffffff?text=Buku"
>

<button onclick="nextStep(2)">
Cari & Ambil Buku
</button>

</div>

<!-- STEP 2 -->

<div id="step2" class="card hidden">

<h3>2. Cek Kondisi Buku</h3>

<label>

<input
type="checkbox"
id="kondisiBuku"
style="width:auto;"
>

 Buku dalam kondisi baik

</label>

<button onclick="checkKondisi()">
Lanjut ke Petugas
</button>

</div>

<!-- STEP 3 -->

<div id="step3" class="card hidden">

<h3>3. Data Peminjaman</h3>

<select id="kelasSiswa" onchange="loadNamaSiswa()">

<option value="">Pilih Kelas</option>

<option>XI-1</option>
<option>XI-2</option>
<option>XI-3</option>
<option>XI-4</option>
<option>XI-5</option>
<option>XI-6</option>
<option>XI-7</option>
<option>XI-8</option>
<option>XI-9</option>
<option>XI-10</option>

</select>

<div class="dropdown-container">

<input
type="text"
id="searchNama"
placeholder="🔍 Pilih atau cari nama siswa..."
onkeyup="filterNama()"
>

<div
id="dropdownNama"
class="dropdown-list hidden">
</div>

</div>

<button onclick="prosesPinjam()">
Konfirmasi Peminjaman
</button>

</div>

<!-- STEP 4 -->

<div id="step4" class="card hidden">

<h3>4. Status Peminjaman</h3>

<div id="detailPinjam" class="status-box"></div>

<button onclick="peminjamanBaru()">
➕ Buat Peminjaman Baru
</button>

</div>

<!-- RIWAYAT -->

<div class="card">

<h3>📋 Riwayat Peminjaman</h3>

<div>

<button class="tab-btn" onclick="filterRiwayat('Semua')">
📋 Semua
</button>

<button class="tab-btn" onclick="filterRiwayat('Dipinjam')">
📚 Dipinjam
</button>

<button class="tab-btn" onclick="filterRiwayat('Selesai')">
✅ Selesai
</button>

</div>

<div class="table-container">

<table id="tabelRiwayat">

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>Kelas</th>
<th>Buku</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="riwayatTable">

</tbody>

</table>

</div>

<button
class="btn-hapus-semua"
onclick="hapusSemua()"
>
🗑 Hapus Semua Riwayat
</button>

<button
class="btn-download"
onclick="downloadExcel()"
>
📥 Download Riwayat
</button>

</div>

</div>

<footer>
Dibuat Oleh Fahrul Lamusu
</footer>

</div>

<script>

const suaraSukses = new Audio(
'https://www.soundjay.com/buttons/sounds/button-3.mp3'
);

const suaraSelesai = new Audio(
'https://www.soundjay.com/buttons/sounds/button-09.mp3'
);

/* JAM */

setInterval(()=>{

let now = new Date();

document.getElementById("jam").innerHTML =
now.toLocaleTimeString('id-ID',{
hour:'2-digit',
minute:'2-digit'
});

},1000);

/* DARK MODE */

function darkMode(){
document.body.classList.toggle("dark");
}

/* DATA SISWA */

const dataSiswa = {

"XI-2":[

"Abdul Rizki Rafa Hiola",
"Aira Mohi",
"Almira Juniara Tilahunga",
"Amelia H. Radzak",
"Annisa Salsabila Badu",
"Ardiansyah Ismail",
"Artika Latiman",
"Balqis Aurelia Susanto",
"Chelsea Ishak",
"Cholid Azzam Surantinojo",
"Fadel Nur Rizki Wakid",
"Fahrul Lamusu",
"Fakhriansyah Eka Tabri",
"Fatriyaningsih Putri Yasin",
"Fauzan Fatih Tolinggilo",
"Fauzia Nurazizah Rauf",
"Indah Cahyaning Wulan",
"Jenny Mulyani Hasan",
"Jesika Jamalu",
"Kanaya Gufranai Kai",
"Khumaira Umar",
"Moh. Adi Firdaus",
"Moh. Farel Ali",
"Moh. Ilyansyah Kaharu",
"Moh. Rayhan Panggi",
"Moh. Ridho Prasetyo Lasaleng",
"Mutmainah Dali",
"Nabila Putri Amara",
"Navila Cahyani Masi",
"Nazwa Kirana",
"Nurain Nggadu",
"Putri Nuraini Nento",
"Sarah Zetira Alaydrus",
"Shawwan Sobri I. Maunty",
"Siti Aura Rivai"

]

};

let namaDipilih = "";
let filterAktif = "Semua";

/* LOAD NAMA */

function loadNamaSiswa(){

let kelas =
document.getElementById("kelasSiswa").value;

let dropdown =
document.getElementById("dropdownNama");

dropdown.innerHTML = "";

if(dataSiswa[kelas]){

dataSiswa[kelas].forEach(nama=>{

dropdown.innerHTML += `
<div
class="dropdown-item"
onclick="pilihNama('${nama}')"
>
${nama}
</div>
`;

});

}else{

dropdown.innerHTML = `
<div class="dropdown-item">
Belum ada daftar nama
</div>
`;

}

dropdown.classList.remove("hidden");

}

/* FILTER NAMA */

function filterNama(){

let input =
document.getElementById("searchNama").value.toLowerCase();

let items =
document.querySelectorAll(".dropdown-item");

items.forEach(item=>{

item.style.display =
item.innerText.toLowerCase().includes(input)
? "block"
: "none";

});

}

/* PILIH NAMA */

function pilihNama(nama){

namaDipilih = nama;

document.getElementById("searchNama").value = nama;

document.getElementById("dropdownNama")
.classList.add("hidden");

}

/* STEP */

function nextStep(step){

document
.querySelectorAll("#step1,#step2,#step3,#step4")
.forEach(card=>{

card.classList.add("hidden");

});

document
.getElementById("step"+step)
.classList.remove("hidden");

}

/* KONDISI */

function checkKondisi(){

let ok =
document.getElementById("kondisiBuku").checked;

if(ok){
nextStep(3);
}else{
alert("Buku rusak!");
}

}

/* COVER */

function tampilCover(){

let buku =
document.getElementById("cariBuku").value;

document.getElementById("coverBuku").src =
"https://via.placeholder.com/120x170/ff85a2/ffffff?text="
+ encodeURIComponent(buku);

}

/* STORAGE */

let dataRiwayat =
JSON.parse(localStorage.getItem("riwayatPerpus")) || [];

/* PINJAM */

function prosesPinjam(){

let kelas =
document.getElementById("kelasSiswa").value;

let buku =
document.getElementById("cariBuku").value;

let jumlah =
document.getElementById("jumlahBuku").value;

if(!kelas || !namaDipilih || !buku || !jumlah){

alert("Lengkapi data!");

return;

}

let now = new Date();

let tanggal =
now.toLocaleDateString('id-ID');

let jam =
now.toLocaleTimeString('id-ID',{
hour:'2-digit',
minute:'2-digit'
});

document.getElementById("detailPinjam").innerHTML = `

<b>Nama:</b> ${namaDipilih}<br>
<b>Kelas:</b> ${kelas}<br>
<b>Buku:</b> ${buku}<br>
<b>Jumlah Buku:</b> ${jumlah}<br>
<b>Tanggal:</b> ${tanggal}<br>
<b>Jam:</b> ${jam}

`;

tambahRiwayat(
namaDipilih,
kelas,
buku,
jumlah,
tanggal,
jam
);

suaraSukses.play();

alert("Peminjaman berhasil!");

nextStep(4);

}

/* TAMBAH RIWAYAT */

function tambahRiwayat(
nama,
kelas,
buku,
jumlah,
tanggal,
jam
){

dataRiwayat.push({

nama,
kelas,
buku,
jumlah,
tanggal,
jam,
status:"Dipinjam"

});

localStorage.setItem(
"riwayatPerpus",
JSON.stringify(dataRiwayat)
);

tampilkanRiwayat();

}

/* FILTER RIWAYAT */

function filterRiwayat(status){

filterAktif = status;

tampilkanRiwayat();

}

/* TAMPILKAN */

function tampilkanRiwayat(){

let table =
document.getElementById("riwayatTable");

table.innerHTML = "";

let dataFilter = dataRiwayat;

if(filterAktif !== "Semua"){

dataFilter =
dataRiwayat.filter(
item => item.status === filterAktif
);

}

if(dataFilter.length === 0){

table.innerHTML = `

<tr>

<td class="nomor">1</td>

<td colspan="8" class="kosong">
Belum ada data
</td>

</tr>

`;

return;

}

dataFilter.forEach((item,index)=>{

let row = table.insertRow();

row.innerHTML = `

<td class="nomor">${index+1}</td>

<td>${item.nama}</td>

<td>${item.kelas}</td>

<td>${item.buku}</td>

<td>${item.jumlah}</td>

<td>${item.tanggal}</td>

<td>${item.jam}</td>

<td class="status">${item.status}</td>

<td>

<button
class="btn-selesai"
onclick="tandaiSelesai(${index})"
>
✔
</button>

<button
class="btn-edit"
onclick="editRiwayat(${index})"
>
✏
</button>

</td>

`;

if(item.status === "Selesai"){
row.classList.add("selesai");
}

});

}

/* SELESAI */

function tandaiSelesai(index){

dataRiwayat[index].status = "Selesai";

localStorage.setItem(
"riwayatPerpus",
JSON.stringify(dataRiwayat)
);

suaraSelesai.play();

tampilkanRiwayat();

}

/* EDIT */

function editRiwayat(index){

let bukuBaru =
prompt(
"Edit Nama Buku",
dataRiwayat[index].buku
);

let jumlahBaru =
prompt(
"Edit Jumlah Buku",
dataRiwayat[index].jumlah
);

if(bukuBaru && jumlahBaru){

dataRiwayat[index].buku = bukuBaru;
dataRiwayat[index].jumlah = jumlahBaru;

localStorage.setItem(
"riwayatPerpus",
JSON.stringify(dataRiwayat)
);

tampilkanRiwayat();

}

}

/* BARU */

function peminjamanBaru(){

document.getElementById("kelasSiswa").value = "";
document.getElementById("searchNama").value = "";
document.getElementById("cariBuku").value = "";
document.getElementById("jumlahBuku").value = "";

document.getElementById("dropdownNama")
.classList.add("hidden");

document.getElementById("kondisiBuku").checked = false;

namaDipilih = "";

nextStep(1);

}

/* HAPUS */

function hapusSemua(){

let konfirmasi =
confirm("Hapus semua riwayat?");

if(konfirmasi){

dataRiwayat = [];

localStorage.removeItem("riwayatPerpus");

tampilkanRiwayat();

}

}

/* DOWNLOAD */

function downloadExcel(){

let table = `
<table border="2">

<tr>
<th>No</th>
<th>Nama</th>
<th>Kelas</th>
<th>Buku</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
</tr>

`;

dataRiwayat.forEach((item,index)=>{

table += `

<tr>

<td>${index+1}</td>
<td>${item.nama}</td>
<td>${item.kelas}</td>
<td>${item.buku}</td>
<td>${item.jumlah}</td>
<td>${item.tanggal}</td>
<td>${item.jam}</td>
<td>${item.status}</td>

</tr>

`;

});

table += `</table>`;

let html = `

<html>

<head>

<meta charset="UTF-8">

<style>

table{
border-collapse:collapse;
width:100%;
font-size:20px;
}

th,td{
border:3px solid black;
padding:20px;
text-align:center;
}

th{
background:#ff85a2;
color:white;
font-weight:bold;
}

h1{
text-align:center;
color:#d63384;
font-size:30px;
margin-bottom:30px;
}

</style>

</head>

<body>

<h1>
Laporan Riwayat Peminjaman Buku Perpustakaan
</h1>

${table}

</body>

</html>

`;

let blob = new Blob(
['\ufeff', html],
{
type:'application/vnd.ms-excel'
}
);

let url =
URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"Laporan_Riwayat_Perpustakaan.xls";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

}

/* LOAD */

tampilkanRiwayat();

</script>

</body>
</html>
