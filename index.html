<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Perpus Pinky</title>

<style>

:root{
    --pink1:#ff85a2;
    --pink2:#fbb1bd;
    --pink3:#fff0f5;
    --pink4:#d63384;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--pink3);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.mobile-container{
    width:100%;
    max-width:450px;
    min-height:100vh;
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

header{
    background:linear-gradient(135deg,var(--pink1),var(--pink4));
    color:white;
    text-align:center;
    padding:25px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

header h1{
    font-size:28px;
}

#jam{
    margin-top:10px;
    font-size:20px;
}

.dark-btn{
    margin-top:15px;
    background:white;
    color:var(--pink4);
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.content{
    padding:18px;
}

.card{
    background:white;
    border:2px solid var(--pink2);
    border-radius:22px;
    padding:18px;
    margin-bottom:15px;
}

h3{
    color:var(--pink4);
    margin-bottom:15px;
    font-size:22px;
}

button{
    border:none;
    cursor:pointer;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.dashboard-box{
    background:linear-gradient(135deg,#ff85a2,#ffb6c1);
    padding:12px;
    border-radius:18px;
    text-align:center;
    color:white;
}

.dashboard-icon{
    font-size:22px;
}

.dashboard-number{
    font-size:20px;
    font-weight:bold;
    margin-top:4px;
}

.dashboard-text{
    font-size:12px;
    margin-top:3px;
}

.table-container{
    overflow-x:auto;
    width:100%;
}

table{
    border-collapse:collapse;
    min-width:1100px;
    width:max-content;
}

th{
    background:var(--pink1);
    color:white;
    padding:10px;
    font-size:14px;
    white-space:nowrap;
}

td{
    border:1px solid #ddd;
    padding:8px 10px;
    font-size:13px;
    text-align:center;
    white-space:nowrap;
}

.nomor{
    color:var(--pink4);
    font-weight:bold;
}

.kosong{
    color:#999;
}

.selesai{
    text-decoration:line-through;
    opacity:0.6;
}

.btn-selesai{
    background:#28a745;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
}

.filter-container{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.filter-btn{
    background:#ff85a2;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    font-size:12px;
}

.btn-hapus-semua{
    width:auto;
    background:#dc3545;
    color:white;
    padding:10px 14px;
    font-size:13px;
    border-radius:12px;
    display:block;
    margin-left:auto;
    margin-top:15px;
}

.btn-download{
    width:auto;
    background:#6f42c1;
    color:white;
    padding:10px 14px;
    font-size:13px;
    border-radius:12px;
    display:block;
    margin-left:auto;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:30px;
    color:#999;
    font-size:15px;
}

.dark{
    background:#1e1e1e;
}

.dark .mobile-container{
    background:#2b2b2b;
    color:white;
}

.dark .card{
    background:#333;
}

</style>

</head>

<body>

<div class="mobile-container">

<header>

<h1>📚 E-Perpus Pinky</h1>

<p>Tugas Informatika Kelas 11</p>

<p id="jam"></p>

<button class="dark-btn" onclick="darkMode()">
🌙 Dark Mode
</button>

</header>

<div class="content">

<!-- DASHBOARD -->

<div class="card">

<h3>📊 Dashboard Premium</h3>

<div class="dashboard-grid">

<div class="dashboard-box">

<div class="dashboard-icon">📚</div>

<div id="totalBuku" class="dashboard-number">0</div>

<div class="dashboard-text">Total Buku</div>

</div>

<div class="dashboard-box">

<div class="dashboard-icon">👨‍🎓</div>

<div id="totalSiswa" class="dashboard-number">0</div>

<div class="dashboard-text">Total Siswa</div>

</div>

<div class="dashboard-box">

<div class="dashboard-icon">📝</div>

<div id="totalTransaksi" class="dashboard-number">0</div>

<div class="dashboard-text">Transaksi</div>

</div>

<div class="dashboard-box">

<div class="dashboard-icon">✅</div>

<div id="totalSelesai" class="dashboard-number">0</div>

<div class="dashboard-text">Selesai</div>

</div>

</div>

</div>

<!-- RIWAYAT -->

<div class="card">

<h3>📋 Riwayat Peminjaman</h3>

<!-- TOMBOL FILTER -->

<div class="filter-container">

<button class="filter-btn" onclick="filterRiwayat('Semua')">
📋 Semua
</button>

<button class="filter-btn" onclick="filterRiwayat('Dipinjam')">
📚 Dipinjam
</button>

<button class="filter-btn" onclick="filterRiwayat('Selesai')">
✅ Selesai
</button>

</div>

<div class="table-container">

<table id="tabelRiwayat">

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>Kelas</th>
<th>Buku</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="riwayatTable">

<tr>

<td class="nomor">1</td>

<td colspan="8" class="kosong">
Belum ada riwayat peminjaman
</td>

</tr>

</tbody>

</table>

</div>

<button
class="btn-hapus-semua"
onclick="hapusSemua()"
>
🗑 Hapus Semua Riwayat
</button>

<button
class="btn-download"
onclick="downloadExcel()"
>
📥 Download Riwayat
</button>

</div>

</div>

<footer>
Dibuat Oleh Fahrul Lamusu
</footer>

</div>

<script>

/* JAM */

setInterval(()=>{

let now = new Date();

document.getElementById("jam").innerHTML =
now.toLocaleTimeString('id-ID',{
hour:'2-digit',
minute:'2-digit'
});

},1000);

/* DARK MODE */

function darkMode(){
document.body.classList.toggle("dark");
}

/* STORAGE */

let dataRiwayat =
JSON.parse(localStorage.getItem("riwayatPerpus")) || [

{
nama:"Fahrul Lamusu",
kelas:"XI-2",
buku:"Informatika",
jumlah:"2",
tanggal:"15/05/2026",
jam:"08.30",
status:"Dipinjam"
}

];

/* DASHBOARD */

function updateDashboard(){

let totalBuku = 0;
let siswaUnik = [];
let selesai = 0;

dataRiwayat.forEach(item=>{

totalBuku += Number(item.jumlah);

if(!siswaUnik.includes(item.nama)){
siswaUnik.push(item.nama);
}

if(item.status === "Selesai"){
selesai++;
}

});

document.getElementById("totalBuku").innerHTML =
totalBuku;

document.getElementById("totalSiswa").innerHTML =
siswaUnik.length;

document.getElementById("totalTransaksi").innerHTML =
dataRiwayat.length;

document.getElementById("totalSelesai").innerHTML =
selesai;

}

/* TAMPILKAN RIWAYAT */

function tampilkanRiwayat(){

let table =
document.getElementById("riwayatTable");

table.innerHTML = "";

if(dataRiwayat.length === 0){

table.innerHTML = `

<tr>

<td class="nomor">1</td>

<td colspan="8" class="kosong">
Belum ada riwayat peminjaman
</td>

</tr>

`;

return;

}

dataRiwayat.forEach((item,index)=>{

let row = table.insertRow();

row.innerHTML = `

<td class="nomor">${index+1}</td>

<td>${item.nama}</td>

<td>${item.kelas}</td>

<td>${item.buku}</td>

<td>${item.jumlah}</td>

<td>${item.tanggal}</td>

<td>${item.jam}</td>

<td class="status">${item.status}</td>

<td>

<button
class="btn-selesai"
onclick="tandaiSelesai(${index})"
>
✔ Selesai
</button>

</td>

`;

if(item.status === "Selesai"){
row.classList.add("selesai");
}

});

}

/* PINDAH TOMBOL SELESAI */

function tandaiSelesai(index){

dataRiwayat[index].status = "Selesai";

localStorage.setItem(
"riwayatPerpus",
JSON.stringify(dataRiwayat)
);

tampilkanRiwayat();
updateDashboard();

}

/* FILTER */

function filterRiwayat(status){

let rows =
document.querySelectorAll("#riwayatTable tr");

rows.forEach((row,index)=>{

if(index===0)return;

let statusCell =
row.querySelector(".status");

if(!statusCell)return;

if(status === "Semua"){
row.style.display = "";
}else{
row.style.display =
statusCell.innerHTML === status
? ""
: "none";
}

});

}

/* HAPUS */

function hapusSemua(){

let konfirmasi =
confirm("Hapus semua riwayat?");

if(konfirmasi){

dataRiwayat = [];

localStorage.removeItem("riwayatPerpus");

tampilkanRiwayat();

updateDashboard();

}

}

/* DOWNLOAD */

function downloadExcel(){

let html = `

<html>

<head>

<meta charset="UTF-8">

<style>

body{
font-family:Arial;
padding:30px;
}

h1{
text-align:center;
font-size:30px;
margin-bottom:30px;
color:#d63384;
}

table{
border-collapse:collapse;
width:100%;
font-size:22px;
}

th,td{
border:3px solid black;
padding:24px 45px;
text-align:center;
white-space:nowrap;
}

th{
background:#ffb6c1;
font-weight:bold;
}

</style>

</head>

<body>

<h1>
Laporan Riwayat Peminjaman Buku Perpustakaan
</h1>

${document.getElementById("tabelRiwayat").outerHTML}

</body>

</html>

`;

let blob = new Blob(
['\ufeff', html],
{
type:'application/vnd.ms-excel'
}
);

let url =
URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"Laporan_Riwayat_Perpustakaan.xls";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

}

/* LOAD */

tampilkanRiwayat();
updateDashboard();

</script>

</body>
</html>
